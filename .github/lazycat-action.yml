version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/odoo.lpk

update:
  strategy: publish
  version_source:
    type: image
    image: odoo

build:
  run_buildscript: false

images:
  - id: odoo
    target: service
    service: odoo-web
    source: docker.io/library/odoo
    channel: stable
    tag_regex: '^\d+\.\d+$'
    version_regex: '^(?P<version>\d+\.\d+)$'
    version_template: '{version}.0'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
    create_if_missing: false
    changelog_locales: [zh, en]
  private:
    enabled: true
    skip_if_version_exists: true
    name: Odoo
    summary: Published from GitHub Actions
